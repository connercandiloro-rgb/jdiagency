<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JDI Mock Browser — Reference</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --white: #f5f2eb;
    --accent: #d4f03c;
    --gray-light: #888;
  }

  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 3rem;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── MOCK WRAPPER ── */
  .hero-mock {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.75rem;
    width: 500px;
  }

  .hero-mock-browser {
    width: 100%;
    background: #111;
    border-radius: 8px;
    border: 1px solid #2a2a2a;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,240,60,0.08);
  }

  /* ── TITLE BAR ── */
  .hero-mock-bar {
    background: #1a1a1a;
    padding: 0.55rem 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    border-bottom: 1px solid #2a2a2a;
  }

  .hero-mock-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .hero-mock-url {
    flex: 1;
    background: #111;
    border-radius: 3px;
    height: 18px;
    margin: 0 0.4rem;
    display: flex;
    align-items: center;
    padding: 0 0.5rem;
  }

  .hero-mock-url span {
    font-size: 0.6rem;
    color: var(--gray-light);
    letter-spacing: 0.02em;
  }

  /* ── SITE NAV ── */
  .hero-mock-nav {
    background: #0f0f0f;
    padding: 0.5rem 0.75rem;
    display: flex;
    align-items: center;
    border-bottom: 1px solid #1e1e1e;
  }

  /* ── HERO STRIP ── */
  .hero-mock-hero-strip {
    height: 110px;
    background: linear-gradient(135deg, #141a0e 0%, #0d1108 100%);
    display: flex;
    align-items: center;
    padding: 0 1rem;
    gap: 0.75rem;
    border-bottom: 1px solid #1e1e1e;
  }

  .hero-mock-leaf { font-size: 2rem; flex-shrink: 0; opacity: 0.85; }
  .hero-mock-hero-text { flex: 1; }

  /* ── SKELETON BARS ── */
  .hero-mock-h {
    height: 7px;
    background: #2e2e2e;
    border-radius: 2px;
    margin-bottom: 5px;
  }

  .hero-mock-h.wide  { width: 75%; }
  .hero-mock-h.accent { background: rgba(212,240,60,0.4); }
  .hero-mock-h.btn-g  { width: 30%; height: 16px; background: rgba(212,240,60,0.6); border-radius: 2px; margin-bottom: 0; }
  .hero-mock-h.btn-o  { width: 22%; height: 16px; background: transparent; border: 1px solid #444; border-radius: 2px; margin-bottom: 0; }

  /* ── SERVICE CARDS ── */
  .hero-mock-cards {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    padding: 10px;
    background: #0d0d0d;
  }

  .hero-mock-card {
    background: #1a1a1a;
    border-radius: 4px;
    padding: 10px 9px;
    border: 1px solid #252525;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .hero-mock-icon { font-size: 0.9rem; margin-bottom: 4px; }

  /* ── TESTIMONIAL ── */
  .hero-mock-testimonial {
    padding: 10px 12px;
    background: #0f0f0f;
    border-top: 1px solid #1a1a1a;
  }

  .hero-mock-stars {
    font-size: 0.55rem;
    color: rgba(212,240,60,0.7);
    letter-spacing: 1px;
  }

  /* ── FOOTER ── */
  .hero-mock-footer {
    padding: 8px 12px;
    background: #0a0a0a;
    border-top: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
  }

  /* ── CAPTION ── */
  .hero-mock-label {
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    color: rgba(212,240,60,0.5);
    text-transform: uppercase;
    text-align: right;
  }
</style>
</head>
<body>

  <div class="hero-mock">
    <div class="hero-mock-browser">

      <!-- Title bar -->
      <div class="hero-mock-bar">
        <div class="hero-mock-dot" style="background:#ff5f57;"></div>
        <div class="hero-mock-dot" style="background:#ffbd2e;"></div>
        <div class="hero-mock-dot" style="background:#28c840;"></div>
        <div class="hero-mock-url"><span>mikeslandscaping.com</span></div>
      </div>

      <!-- Site nav -->
      <div class="hero-mock-nav">
        <div class="hero-mock-h" style="width:18%; height:6px; background:#2a2a2a;"></div>
        <div style="display:flex; gap:8px; margin-left:auto;">
          <div class="hero-mock-h" style="width:30px; height:5px; background:#222;"></div>
          <div class="hero-mock-h" style="width:30px; height:5px; background:#222;"></div>
          <div class="hero-mock-h" style="width:30px; height:5px; background:#222;"></div>
          <div class="hero-mock-h btn-g" style="width:44px; height:16px; margin-bottom:0;"></div>
        </div>
      </div>

      <!-- Hero strip -->
      <div class="hero-mock-hero-strip">
        <div class="hero-mock-leaf">🌿</div>
        <div class="hero-mock-hero-text">
          <div class="hero-mock-h wide"></div>
          <div class="hero-mock-h accent" style="width:55%;"></div>
          <div class="hero-mock-h" style="width:80%; height:4px; margin-top:2px; background:#1e2a14;"></div>
          <div class="hero-mock-h" style="width:65%; height:4px; background:#1e2a14;"></div>
          <div style="margin-top:10px; display:flex; gap:6px;">
            <div class="hero-mock-h btn-g" style="width:60px;"></div>
            <div class="hero-mock-h btn-o" style="width:50px;"></div>
          </div>
        </div>
      </div>

      <!-- Service cards -->
      <div class="hero-mock-cards">
        <div class="hero-mock-card">
          <div class="hero-mock-icon">✂️</div>
          <div class="hero-mock-h" style="width:75%; height:6px; background:#252525;"></div>
          <div class="hero-mock-h" style="width:55%; height:4px; margin-top:3px;"></div>
          <div class="hero-mock-h" style="width:60%; height:4px;"></div>
        </div>
        <div class="hero-mock-card">
          <div class="hero-mock-icon">🌱</div>
          <div class="hero-mock-h" style="width:75%; height:6px; background:#252525;"></div>
          <div class="hero-mock-h" style="width:55%; height:4px; margin-top:3px;"></div>
          <div class="hero-mock-h" style="width:60%; height:4px;"></div>
        </div>
        <div class="hero-mock-card">
          <div class="hero-mock-icon">💧</div>
          <div class="hero-mock-h" style="width:75%; height:6px; background:#252525;"></div>
          <div class="hero-mock-h" style="width:55%; height:4px; margin-top:3px;"></div>
          <div class="hero-mock-h" style="width:60%; height:4px;"></div>
        </div>
      </div>

      <!-- Testimonial -->
      <div class="hero-mock-testimonial">
        <div class="hero-mock-stars">★★★★★</div>
        <div class="hero-mock-h" style="width:85%; height:5px; margin-top:6px;"></div>
        <div class="hero-mock-h" style="width:65%; height:5px;"></div>
        <div style="display:flex; align-items:center; gap:6px; margin-top:8px;">
          <div style="width:16px; height:16px; border-radius:50%; background:#2a2a2a; flex-shrink:0;"></div>
          <div class="hero-mock-h" style="width:40%; height:4px; margin-bottom:0;"></div>
        </div>
      </div>

      <!-- Footer -->
      <div class="hero-mock-footer">
        <div class="hero-mock-h" style="width:30%; height:5px; background:#1a1a1a;"></div>
        <div style="display:flex; gap:8px; margin-left:auto;">
          <div class="hero-mock-h" style="width:25px; height:5px;"></div>
          <div class="hero-mock-h" style="width:25px; height:5px;"></div>
          <div class="hero-mock-h" style="width:25px; height:5px;"></div>
        </div>
      </div>

    </div>
    <div class="hero-mock-label">Built in 5–7 days. Just like this.</div>
  </div>

</body>
</html>
